name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Build bootstrapper
        shell: powershell
        run: .\scripts\build.ps1

      - name: Download signed NextDesk test fixture
        shell: powershell
        run: .\scripts\download-upstream.ps1

      - name: Test Authenticode verification
        shell: powershell
        run: .\scripts\test.ps1

      - name: Upload unsigned build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextdesk-bootstrapper-unsigned
          path: dist/nextdesk-installer.exe
          if-no-files-found: error
