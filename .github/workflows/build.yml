name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Build bootstrapper
        shell: powershell
        run: .\scripts\build.ps1

      - name: Test Authenticode verification
        shell: powershell
        run: |
          $fixture = Join-Path $env:WINDIR 'explorer.exe'
          $certificate = New-Object System.Security.Cryptography.X509Certificates.X509Certificate2(
            [System.Security.Cryptography.X509Certificates.X509Certificate]::CreateFromSignedFile($fixture)
          )
          .\scripts\test.ps1 `
            -SignedInstaller $fixture `
            -ExpectedPublisherSubject $certificate.Subject

      - name: Upload unsigned build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextdesk-bootstrapper-unsigned
          path: dist/nextdesk-installer.exe
          if-no-files-found: error
